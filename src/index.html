<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrikeFare — Sign In</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background: #f1f5f9;
        display: flex;
        min-height: 100vh;
      }

      .auth-left {
        display: none;
        flex: 1;
        background: linear-gradient(
          135deg,
          var(--primary-dark) 0%,
          var(--primary-light) 100%
        );
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 3rem;
      }
      @media (min-width: 1024px) {
        .auth-left {
          display: flex;
        }
      }
      .auth-left-tagline {
        color: rgba(255, 255, 255, 0.85);
        font-size: 1.1rem;
        margin-top: 1.5rem;
        text-align: center;
        max-width: 320px;
        line-height: 1.6;
      }
      .auth-left-brand {
        font-size: 2.2rem;
        font-weight: 800;
        color: #fff;
      }

      .auth-right {
        width: 100%;
        max-width: 480px;
        margin: auto;
        background: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 2.5rem 2rem;
        box-shadow: -4px 0 32px rgba(0, 0, 0, 0.06);
      }
      @media (min-width: 1024px) {
        .auth-right {
          min-height: unset;
          border-radius: 0.875rem;
          margin: auto 2rem auto 0;
          min-height: 100vh;
          border-radius: 0;
        }
      }

      .auth-logo {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--primary);
        margin-bottom: 0.25rem;
      }
      .auth-sub {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
      }
      .auth-title {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 1.25rem 0;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .divider span {
        font-size: 0.8rem;
        color: var(--text-muted);
        white-space: nowrap;
      }

      .google-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        width: 100%;
        padding: 0.7rem 1rem;
        border-radius: 0.5rem;
        border: 1.5px solid var(--border);
        background: #fff;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
        transition:
          background 0.2s,
          box-shadow 0.2s;
      }
      .google-btn:hover {
        background: #f8fafc;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .auth-footer {
        text-align: center;
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: 1.5rem;
      }
      .auth-footer a {
        color: var(--primary);
        font-weight: 700;
        text-decoration: none;
      }
      .auth-footer a:hover {
        text-decoration: underline;
      }

      #password-group {
        display: none;
      }
      .error-msg {
        font-size: 0.8rem;
        color: var(--danger);
        margin-top: 0.35rem;
        display: none;
      }

      /* floating dots bg for left panel */
      .dots-bg {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .dots-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.15) 1px,
          transparent 1px
        );
        background-size: 28px 28px;
      }
    </style>
  </head>
  <body>
    <!-- Left decorative panel -->
    <div class="auth-left" style="position: relative; overflow: hidden">
      <div class="dots-bg"></div>
      <div style="position: relative; z-index: 1; text-align: center">
        <img
          src="img/trike-logo.png"
          alt="TrikeFare"
          style="
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 1rem;
          "
        />
        <div class="auth-left-brand">TrikeFare</div>
        <p class="auth-left-tagline">
          Calculate accurate tricycle fares across Koronadal City instantly.
        </p>
      </div>
    </div>

    <!-- Right sign-in form -->
    <div class="auth-right">
      <div class="auth-logo">TrikeFare.</div>
      <p class="auth-sub">City of Koronadal Transportation System</p>
      <h1 class="auth-title">Sign in to your account</h1>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          class="form-input"
          id="email"
          type="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <div class="error-msg" id="email-error"></div>
      </div>

      <div class="form-group" id="password-group">
        <label class="form-label" for="password">Password</label>
        <div style="position: relative">
          <input
            class="form-input"
            id="password"
            type="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            style="padding-right: 2.8rem"
          />
          <button
            type="button"
            id="toggle-pw"
            style="
              position: absolute;
              right: 0.75rem;
              top: 50%;
              transform: translateY(-50%);
              background: none;
              border: none;
              cursor: pointer;
              color: var(--text-muted);
              font-size: 1rem;
            "
          >
            👁
          </button>
        </div>
        <div class="error-msg" id="pw-error"></div>
      </div>

      <button
        class="btn btn-primary btn-full btn-lg"
        id="sign-in-btn"
        onclick="handleSignIn()"
        style="margin-top: 0.5rem"
      >
        Continue
      </button>

      <div class="divider"><span>or continue with</span></div>

      <button
        class="google-btn"
        onclick="window.location.href = API_URL + '/auth/google'"
      >
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path
            fill="#EA4335"
            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
          />
          <path
            fill="#4285F4"
            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
          />
          <path
            fill="#FBBC05"
            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
          />
          <path
            fill="#34A853"
            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
          />
        </svg>
        Continue with Google
      </button>

      <p class="auth-footer">
        Don't have an account? <a href="request-otp.html">Create Account</a>
      </p>
    </div>

    <script>
      const API_URL = "https://fare-backend.onrender.com";
      let passwordStage = false;

      // Toggle password visibility
      document.getElementById("toggle-pw").addEventListener("click", () => {
        const pw = document.getElementById("password");
        const btn = document.getElementById("toggle-pw");
        if (pw.type === "password") {
          pw.type = "text";
          btn.textContent = "🙈";
        } else {
          pw.type = "password";
          btn.textContent = "👁";
        }
      });

      // Allow Enter key
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleSignIn();
      });

      function showError(id, msg) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.style.display = "block";
      }
      function clearErrors() {
        document.querySelectorAll(".error-msg").forEach((el) => {
          el.style.display = "none";
          el.textContent = "";
        });
      }

      async function handleSignIn() {
        clearErrors();
        const email = document
          .getElementById("email")
          .value.trim()
          .toLowerCase();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("sign-in-btn");

        if (!email) {
          showError("email-error", "Please enter your email address.");
          return;
        }

        // Admin shortcut
        if (email === "tricyclefareadmin@gmail.com") {
          if (!passwordStage) {
            document.getElementById("password-group").style.display = "block";
            passwordStage = true;
            btn.textContent = "Sign In";
            return;
          }
          if (password === "admin123") {
            window.location.href = "admin.html";
            return;
          }
          showError("pw-error", "Incorrect admin password.");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Checking…";

        try {
          if (!passwordStage) {
            const res = await fetch(`${API_URL}/check-email`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email }),
            });
            const result = await res.json();

            if (!result.found) {
              showError("email-error", "This email is not registered.");
            } else if (result.hasGoogleId && !result.hasPassword) {
              window.location.href = `${API_URL}/auth/google`;
              return;
            } else {
              document.getElementById("password-group").style.display = "block";
              passwordStage = true;
              btn.textContent = "Sign In";
              document.getElementById("password").focus();
            }
          } else {
            if (!password) {
              showError("pw-error", "Please enter your password.");
              return;
            }
            const res = await fetch(`${API_URL}/check-password`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password }),
            });
            const result = await res.json();
            if (result.success) {
              localStorage.setItem("user", JSON.stringify(result.user));
              window.location.href = "home.html";
            } else {
              showError("pw-error", "Incorrect password. Please try again.");
            }
          }
        } catch (err) {
          showError("email-error", "Network error. Please try again.");
          console.error(err);
        } finally {
          btn.disabled = false;
          if (!btn.textContent.includes("Sign In"))
            btn.textContent = "Continue";
        }
      }
    </script>
  </body>
</html>
