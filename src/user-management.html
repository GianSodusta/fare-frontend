<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrikeFare — User Management</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background: var(--bg);
      }
      .sidenav {
        width: 220px;
        min-height: 100vh;
        background: var(--surface);
        border-right: 1px solid var(--border);
        position: fixed;
        left: 0;
        top: 0;
        display: none;
        flex-direction: column;
        padding: 1.25rem 1rem;
        z-index: 30;
      }
      @media (min-width: 1024px) {
        .sidenav {
          display: flex;
        }
      }
      .sidenav-brand .name {
        font-size: 1rem;
        font-weight: 800;
        color: var(--primary);
      }
      .sidenav-brand .sub {
        font-size: 0.65rem;
        color: var(--text-muted);
      }
      .sidenav-brand {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.75rem;
      }
      .sidenav-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 700;
        color: var(--text-muted);
        padding: 0 0.5rem;
        margin: 0.75rem 0 0.3rem;
      }
      .sidenav-btn {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        width: 100%;
        padding: 0.55rem 0.75rem;
        border-radius: 0.5rem;
        border: none;
        background: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text);
        text-align: left;
        transition: all 0.2s;
        margin-bottom: 0.15rem;
      }
      .sidenav-btn:hover {
        background: #fef3c7;
        color: #92400e;
      }
      .sidenav-btn.active {
        background: var(--primary);
        color: #fff;
      }
      .sidenav-btn.danger {
        color: var(--danger);
      }
      .sidenav-btn.danger:hover {
        background: #fef2f2;
      }
      .sidenav-footer {
        margin-top: auto;
        font-size: 0.7rem;
        color: var(--text-muted);
        text-align: center;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
      }

      .content {
        padding: 1.5rem;
        margin-top: 60px;
      }
      @media (min-width: 1024px) {
        .content {
          margin-left: 220px;
        }
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .search-bar {
        flex: 1;
        min-width: 180px;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 0.5rem;
        padding: 0.45rem 0.75rem;
      }
      .search-bar input {
        border: none;
        outline: none;
        font-family: inherit;
        font-size: 0.875rem;
        flex: 1;
        background: transparent;
      }
      .filter-select {
        padding: 0.45rem 0.75rem;
        border: 1.5px solid var(--border);
        border-radius: 0.5rem;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 600;
        background: var(--surface);
        outline: none;
        cursor: pointer;
      }
      .filter-select:focus {
        border-color: var(--primary);
      }

      .table-card {
        background: var(--surface);
        border-radius: 0.875rem;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .table-scroll {
        overflow-x: auto;
      }
      .data-table th,
      .data-table td {
        white-space: nowrap;
      }

      .user-avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1, #818cf8);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 0.75rem;
        font-weight: 700;
      }
      .user-cell {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .action-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0.25rem 0.4rem;
        border-radius: 0.3rem;
        font-size: 0.8rem;
        transition: background 0.15s;
      }
      .action-btn:hover {
        background: var(--bg);
      }

      /* Map modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 500;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--surface);
        border-radius: 1rem;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        padding: 1.5rem;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.25rem;
      }
      .modal-title {
        font-size: 1rem;
        font-weight: 800;
      }
      .modal-close {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        color: var(--text-muted);
      }

      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
      }
      .empty-state .icon {
        font-size: 2.5rem;
        margin-bottom: 0.75rem;
      }

      .table-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        border-top: 1px solid var(--border);
        font-size: 0.8rem;
        color: var(--text-muted);
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .pagination {
        display: flex;
        gap: 0.25rem;
      }
      .page-btn {
        padding: 0.3rem 0.65rem;
        border-radius: 0.35rem;
        border: 1.5px solid var(--border);
        background: var(--surface);
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 600;
        transition: all 0.15s;
      }
      .page-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
      }
      .page-btn.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .page-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div id="preloader"><div class="loader-wheel"></div></div>

    <nav class="navbar">
      <div class="navbar-brand">
        <img
          src="img/trike-logo.png"
          alt="TrikeFare"
          style="
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
          "
        />
        <div>
          <div class="logo-text">TrikeFare Admin</div>
          <div class="logo-sub">User Management</div>
        </div>
      </div>
      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </nav>
    <div class="overlay" id="overlay"></div>
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-close" id="sidebar-close">✕</button>
      <div style="text-align: center; margin: 1rem 0 0.5rem">
        <span
          class="badge badge-primary"
          style="font-size: 0.8rem; padding: 0.3rem 0.9rem"
          >Admin</span
        >
      </div>
      <div class="sidebar-email">tricyclefareadmin@gmail.com</div>
      <nav class="sidebar-nav" style="margin-top: 1rem">
        <button
          class="sidebar-btn"
          onclick="window.location.href = 'admin.html'"
        >
          📊 Dashboard
        </button>
        <button class="sidebar-btn active">👥 User Management</button>
        <button
          class="sidebar-btn"
          onclick="window.location.href = 'fare-settings.html'"
        >
          ⚙️ Fare Settings
        </button>
        <div class="sidebar-divider"></div>
        <button
          class="sidebar-btn"
          onclick="window.location.href = 'about.html'"
        >
          ℹ️ System Info
        </button>
        <button class="sidebar-btn danger" id="logoutBtn">🚪 Sign Out</button>
      </nav>
    </aside>

    <div class="sidenav">
      <div class="sidenav-brand">
        <span style="font-size: 1.5rem">🛺</span>
        <div>
          <div class="name">TrikeFare</div>
          <div class="sub">Admin Panel</div>
        </div>
      </div>
      <div class="sidenav-label">Main</div>
      <button class="sidenav-btn" onclick="window.location.href = 'admin.html'">
        📊 Dashboard
      </button>
      <button class="sidenav-btn active">👥 User Management</button>
      <button
        class="sidenav-btn"
        onclick="window.location.href = 'fare-settings.html'"
      >
        ⚙️ Fare Settings
      </button>
      <div class="sidenav-label">Other</div>
      <button class="sidenav-btn" onclick="window.location.href = 'about.html'">
        ℹ️ System Info
      </button>
      <button
        class="sidenav-btn danger"
        onclick="
          if (confirm('Sign out?')) {
            localStorage.clear();
            window.location.href = 'index.html';
          }
        "
      >
        🚪 Sign Out
      </button>
      <div class="sidenav-footer">TrikeFare v2.0<br />City of Koronadal</div>
    </div>

    <div class="content">
      <div
        style="
          margin-bottom: 1.25rem;
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-wrap: wrap;
          gap: 0.5rem;
        "
      >
        <div>
          <h1 style="font-size: 1.25rem; font-weight: 800">
            👥 User Management
          </h1>
          <p
            style="
              font-size: 0.8rem;
              color: var(--text-muted);
              margin-top: 0.1rem;
            "
          >
            Manage registered TrikeFare users
          </p>
        </div>
        <div class="badge badge-neutral" id="total-badge">Loading…</div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-bar">
          <span>🔍</span>
          <input
            type="text"
            id="search-input"
            placeholder="Search by name or email…"
          />
        </div>
        <select
          class="filter-select"
          id="status-filter"
          onchange="applyFilters()"
        >
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="suspended">Suspended</option>
        </select>
        <button
          class="btn btn-outline"
          onclick="loadUsers()"
          style="white-space: nowrap"
        >
          ↺ Refresh
        </button>
      </div>

      <!-- Table -->
      <div class="table-card">
        <div class="table-scroll">
          <table class="data-table" id="users-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Email</th>
                <th>Auth</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr>
                <td colspan="5">
                  <div class="empty-state">
                    <div class="icon">⏳</div>
                    <div>Loading users…</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="table-footer">
          <span id="showing-label">Showing 0 of 0 users</span>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>

    <!-- Confirm suspend modal -->
    <div
      class="modal-overlay"
      id="modal"
      onclick="if (event.target === this) closeModal();"
    >
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="modal-title">Confirm Action</span>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <p
          id="modal-body"
          style="
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
          "
        ></p>
        <div style="display: flex; gap: 0.75rem">
          <button
            class="btn btn-outline"
            style="flex: 1"
            onclick="closeModal()"
          >
            Cancel
          </button>
          <button class="btn btn-danger" style="flex: 1" id="modal-confirm-btn">
            Confirm
          </button>
        </div>
      </div>
    </div>

    <script src="utils.js"></script>
    <script>
      initPreloader();

      let allUsers = [];
      let filtered = [];
      let currentPage = 1;
      const PAGE_SIZE = 12;
      let pendingAction = null;

      function initials(u) {
        return (
          ((u.firstname?.[0] || "") + (u.lastname?.[0] || "")).toUpperCase() ||
          "?"
        );
      }

      async function loadUsers() {
        try {
          const res = await fetch(`${API_URL}/users`);
          if (!res.ok) throw new Error();
          allUsers = await res.json();
          document.getElementById("total-badge").textContent =
            `${allUsers.length} users`;
          applyFilters();
        } catch (e) {
          document.getElementById("users-tbody").innerHTML =
            `<tr><td colspan="5"><div class="empty-state"><div class="icon">⚠️</div><div>Failed to load users</div></div></td></tr>`;
        }
      }

      function applyFilters() {
        const q = document.getElementById("search-input").value.toLowerCase();
        const status = document.getElementById("status-filter").value;
        filtered = allUsers.filter((u) => {
          const name = `${u.firstname} ${u.lastname}`.toLowerCase();
          const email = (u.email || "").toLowerCase();
          const matchQ = !q || name.includes(q) || email.includes(q);
          const matchS = !status || (u.status || "active") === status;
          return matchQ && matchS;
        });
        currentPage = 1;
        renderTable();
      }

      function renderTable() {
        const tbody = document.getElementById("users-tbody");
        const start = (currentPage - 1) * PAGE_SIZE;
        const page = filtered.slice(start, start + PAGE_SIZE);

        if (!page.length) {
          tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="icon">🔍</div><div>No users found</div></div></td></tr>`;
          document.getElementById("showing-label").textContent = "No results";
          document.getElementById("pagination").innerHTML = "";
          return;
        }

        tbody.innerHTML = page
          .map((u) => {
            const status = u.status || "active";
            const authType = u.google_id ? "Google" : "Email";
            const badgeClass =
              status === "active" ? "badge-success" : "badge-danger";
            return `
        <tr>
          <td><div class="user-cell">
            <div class="user-avatar">${initials(u)}</div>
            <span style="font-weight:600;">${u.firstname || ""} ${u.lastname || ""}</span>
          </div></td>
          <td style="color:var(--text-muted);">${u.email || "—"}</td>
          <td><span class="badge ${authType === "Google" ? "badge-primary" : "badge-neutral"}">${authType}</span></td>
          <td><span class="badge ${badgeClass}" style="text-transform:capitalize;">${status}</span></td>
          <td>
            ${
              status === "active"
                ? `<button class="action-btn" title="Suspend" onclick="confirmAction('suspend','${u.email}')">🚫</button>`
                : `<button class="action-btn" title="Activate" onclick="confirmAction('activate','${u.email}')">✅</button>`
            }
            <button class="action-btn" title="Delete" onclick="confirmAction('delete','${u.email}')">🗑️</button>
          </td>
        </tr>`;
          })
          .join("");

        const total = filtered.length;
        document.getElementById("showing-label").textContent =
          `Showing ${start + 1}–${Math.min(start + PAGE_SIZE, total)} of ${total} users`;
        renderPagination(total);
      }

      function renderPagination(total) {
        const pages = Math.ceil(total / PAGE_SIZE);
        const el = document.getElementById("pagination");
        if (pages <= 1) {
          el.innerHTML = "";
          return;
        }
        let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>‹</button>`;
        for (let i = 1; i <= pages; i++) {
          if (
            pages > 6 &&
            Math.abs(i - currentPage) > 2 &&
            i !== 1 &&
            i !== pages
          ) {
            if (i === 2 || i === pages - 1)
              html += `<button class="page-btn" disabled>…</button>`;
            continue;
          }
          html += `<button class="page-btn${i === currentPage ? " active" : ""}" onclick="goPage(${i})">${i}</button>`;
        }
        html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === pages ? "disabled" : ""}>›</button>`;
        el.innerHTML = html;
      }

      function goPage(n) {
        currentPage = n;
        renderTable();
      }

      function confirmAction(action, email) {
        const messages = {
          suspend: `Suspend ${email}? They will not be able to log in until reactivated.`,
          activate: `Reactivate ${email}?`,
          delete: `Permanently delete ${email}? This cannot be undone.`,
        };
        const titles = {
          suspend: "Suspend User",
          activate: "Activate User",
          delete: "Delete User",
        };
        document.getElementById("modal-title").textContent = titles[action];
        document.getElementById("modal-body").textContent = messages[action];
        document.getElementById("modal-confirm-btn").className =
          `btn ${action === "delete" ? "btn-danger" : "btn-primary"}`;
        document.getElementById("modal-confirm-btn").textContent =
          titles[action];
        pendingAction = { action, email };
        document.getElementById("modal").classList.add("open");
      }

      async function executeAction() {
        if (!pendingAction) return;
        const { action, email } = pendingAction;
        closeModal();
        try {
          let res;
          if (action === "delete") {
            res = await fetch(`${API_URL}/users/${encodeURIComponent(email)}`, {
              method: "DELETE",
            });
          } else {
            res = await fetch(
              `${API_URL}/users/${encodeURIComponent(email)}/status`,
              {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  status: action === "suspend" ? "suspended" : "active",
                }),
              },
            );
          }
          if (!res.ok) throw new Error();
          showToast(`User ${action}d successfully.`, "success");
          loadUsers();
        } catch (e) {
          showToast("Action failed. Please try again.", "error");
        }
      }

      function closeModal() {
        document.getElementById("modal").classList.remove("open");
        pendingAction = null;
      }

      document
        .getElementById("modal-confirm-btn")
        .addEventListener("click", executeAction);

      let searchTimer;
      document.getElementById("search-input").addEventListener("input", () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(applyFilters, 250);
      });

      document.getElementById("logoutBtn")?.addEventListener("click", () => {
        if (confirm("Sign out?")) {
          localStorage.clear();
          window.location.href = "index.html";
        }
      });

      loadUsers();
    </script>
  </body>
</html>
