<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrikeFare — Create Account</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background: #f1f5f9;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .auth-card {
        background: #fff;
        border-radius: 1rem;
        box-shadow: 0 4px 32px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 440px;
        padding: 2.25rem 2rem;
      }
      .auth-logo {
        font-size: 1.6rem;
        font-weight: 800;
        color: var(--primary);
        margin-bottom: 0.1rem;
      }
      .auth-sub {
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-bottom: 1.75rem;
      }
      .auth-title {
        font-size: 1.15rem;
        font-weight: 800;
        margin-bottom: 0.35rem;
      }
      .auth-desc {
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-bottom: 1.5rem;
      }
      .back-link {
        font-size: 0.82rem;
        color: var(--primary);
        font-weight: 700;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        margin-bottom: 1.25rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      .error-msg {
        font-size: 0.8rem;
        color: var(--danger);
        margin-top: 0.35rem;
        display: none;
      }
      .success-box {
        background: #d1fae5;
        border: 1px solid #6ee7b7;
        border-radius: 0.625rem;
        padding: 0.875rem 1rem;
        font-size: 0.875rem;
        color: #065f46;
        display: none;
        margin-bottom: 1rem;
      }
      .step-dots {
        display: flex;
        gap: 0.4rem;
        margin-bottom: 1.5rem;
      }
      .dot {
        width: 28px;
        height: 4px;
        border-radius: 99px;
        background: var(--border);
        transition: background 0.3s;
      }
      .dot.active {
        background: var(--primary);
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <div class="auth-logo">TrikeFare.</div>
      <p class="auth-sub">City of Koronadal</p>

      <div class="step-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <a href="index.html" class="back-link">← Back to Sign In</a>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-desc">
        Enter your email to receive a one-time verification code
      </p>

      <div class="success-box" id="success-box">
        ✅ Verification code sent! Check your email inbox (and spam folder).
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <div class="error-msg" id="email-error"></div>
      </div>

      <button
        class="btn btn-primary btn-full btn-lg"
        id="send-btn"
        onclick="sendOTP()"
      >
        Send Verification Code
      </button>

      <div
        style="
          display: flex;
          align-items: center;
          gap: 0.75rem;
          margin: 1.25rem 0;
        "
      >
        <hr
          style="flex: 1; border: none; border-top: 1px solid var(--border)"
        />
        <span style="font-size: 0.8rem; color: var(--text-muted)">or</span>
        <hr
          style="flex: 1; border: none; border-top: 1px solid var(--border)"
        />
      </div>

      <button
        class="btn btn-outline btn-full"
        onclick="window.location.href = API_URL + '/auth/google'"
      >
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path
            fill="#EA4335"
            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
          />
          <path
            fill="#4285F4"
            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
          />
          <path
            fill="#FBBC05"
            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
          />
          <path
            fill="#34A853"
            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
          />
        </svg>
        Sign up with Google
      </button>

      <p
        style="
          text-align: center;
          font-size: 0.82rem;
          color: var(--text-muted);
          margin-top: 1.25rem;
        "
      >
        Already have an account?
        <a
          href="index.html"
          style="color: var(--primary); font-weight: 700; text-decoration: none"
          >Sign In</a
        >
      </p>
    </div>

    <script src="util.js"></script>
    <script>
      document.getElementById("email").addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendOTP();
      });

      async function sendOTP() {
        const email = document
          .getElementById("email")
          .value.trim()
          .toLowerCase();
        const errEl = document.getElementById("email-error");
        const btn = document.getElementById("send-btn");

        errEl.style.display = "none";
        document.getElementById("success-box").style.display = "none";

        if (!email) {
          errEl.textContent = "Please enter your email.";
          errEl.style.display = "block";
          return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          errEl.textContent = "Please enter a valid email.";
          errEl.style.display = "block";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Sending…";

        try {
          const res = await fetch(`${API_URL}/request-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });

          if (res.ok) {
            document.getElementById("success-box").style.display = "block";
            btn.textContent = "Resend Code";
            // Pass email to verify page
            setTimeout(() => {
              window.location.href = `verify-otp.html?email=${encodeURIComponent(email)}`;
            }, 1500);
          } else {
            const text = await res.text();
            if (text.includes("already registered")) {
              errEl.textContent =
                "This email is already registered. Sign in instead.";
            } else {
              errEl.textContent = text || "Failed to send code. Try again.";
            }
            errEl.style.display = "block";
          }
        } catch (e) {
          errEl.textContent = "Network error. Check your connection.";
          errEl.style.display = "block";
        } finally {
          btn.disabled = false;
          if (btn.textContent === "Sending…")
            btn.textContent = "Send Verification Code";
        }
      }
    </script>
  </body>
</html>
